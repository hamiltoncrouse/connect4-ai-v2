<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect 4 AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Connect 4</h1>
        <div class="controls">
            <div class="control-group">
                <label for="difficulty">Difficulty:</label>
                <select id="difficulty">
                    <option value="easy">Easy (Random)</option>
                    <option value="medium">Medium (Defensive)</option>
                    <option value="hard" selected>Hard (Minimax)</option>
                </select>
            </div>
            <button id="restart">New Game</button>
        </div>
        <div id="status-message">Your Turn (Red)</div>
        <div id="trash-talk-container">
            <div id="trash-talk"></div>
            <div id="ai-avatar" title="Click to shock me!">🤖</div>
        </div>
        <div class="board-container">
            <div id="board" class="board"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
