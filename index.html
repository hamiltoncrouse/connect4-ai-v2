<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect 4 AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Connect 4</h1>
        <div class="controls">
            <div class="control-group">
                <label for="difficulty">Difficulty:</label>
                <select id="difficulty">
                    <option value="easy">Easy (Random)</option>
                    <option value="medium">Medium (Defensive)</option>
                    <option value="hard" selected>Hard (Minimax)</option>
                </select>
            </div>
            <button id="restart">New Game</button>
        </div>
        <div id="status-message">Your Turn (Red)</div>
        <div id="trash-talk-container">
            <div id="trash-talk">Welcome to the arena. Prepared to lose?</div>
            <button id="ai-avatar" title="Click to shock me!">
                <svg viewBox="0 0 24 24" width="30" height="30">
                    <path fill="#7f8c8d" d="M12,2A2,2 0 0,1 14,4C14,4.74 13.6,5.39 13,5.73V7H14A3,3 0 0,1 17,10V11H18A2,2 0 0,1 20,13V17A2,2 0 0,1 18,19H17V21A1,1 0 0,1 16,22H8A1,1 0 0,1 7,21V19H6A2,2 0 0,1 4,17V13A2,2 0 0,1 6,11H7V10A3,3 0 0,1 10,7H11V5.73C10.4,5.39 10,4.74 10,4A2,2 0 0,1 12,2M7.5,13A1.5,1.5 0 0,0 6,14.5A1.5,1.5 0 0,0 7.5,16A1.5,1.5 0 0,0 9,14.5A1.5,1.5 0 0,0 7.5,13M16.5,13A1.5,1.5 0 0,0 15,14.5A1.5,1.5 0 0,0 16.5,16A1.5,1.5 0 0,0 18,14.5A1.5,1.5 0 0,0 16.5,13M10,18V19H14V18H10Z" />
                </svg>
                <span>Shock AI</span>
            </button>
        </div>
        <div class="board-container">
            <div id="board" class="board"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
